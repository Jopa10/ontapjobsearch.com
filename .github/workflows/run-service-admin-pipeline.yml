name: Run service-admin pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-service-admin-pipeline:
    name: Run service-admin pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Check human review CSV
        id: human-review
        run: |
          set -euo pipefail
          review_path="pipeline/manual/service-admin-review.csv"
          if [ -f "$review_path" ]; then
            echo "Human review CSV exists: yes"
            echo "exists_before=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Human review CSV exists: no"
            echo "exists_before=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Run service-admin pipeline
        working-directory: pipeline
        run: python -m scripts.service_admin_pipeline

      - name: Commit starter human review CSV
        env:
          HUMAN_REVIEW_EXISTS_BEFORE: ${{ steps.human-review.outputs.exists_before }}
        run: |
          set -euo pipefail
          review_path="pipeline/manual/service-admin-review.csv"

          if [ "$HUMAN_REVIEW_EXISTS_BEFORE" = "yes" ]; then
            echo "Existing human review CSV preserved: yes"
            echo "Human review CSV committed: no"
            exit 0
          fi

          echo "Existing human review CSV preserved: no"

          if [ ! -f "$review_path" ]; then
            echo "::warning::Service-admin pipeline did not create $review_path."
            echo "Human review CSV committed: no"
            exit 0
          fi

          if [ -z "$(git status --porcelain -- "$review_path")" ]; then
            echo "No starter human review CSV changes to commit."
            echo "Human review CSV committed: no"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$review_path"

          staged_files="$(git diff --cached --name-only)"
          if [ "$staged_files" != "$review_path" ]; then
            echo "::error::Refusing to commit files other than $review_path. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Add starter service-admin review CSV"
          git push
          echo "Human review CSV committed: yes"

      - name: Upload service-admin output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-admin-output
          path: pipeline/output-admin-service/
          if-no-files-found: warn
