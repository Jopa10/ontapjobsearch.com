name: Run service-admin pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-service-admin-pipeline:
    name: Run service-admin pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Check Markdown review file
        id: markdown-review
        run: |
          set -euo pipefail
          review_path="pipeline/manual/service-admin-review.md"
          if [ -f "$review_path" ]; then
            echo "Markdown review file exists: yes"
            echo "exists_before=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Markdown review file exists: no"
            echo "exists_before=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Run service-admin pipeline
        working-directory: pipeline
        run: python -m scripts.service_admin_pipeline

      - name: Commit starter Markdown review file
        env:
          MARKDOWN_REVIEW_EXISTS_BEFORE: ${{ steps.markdown-review.outputs.exists_before }}
        run: |
          set -euo pipefail
          review_path="pipeline/manual/service-admin-review.md"

          if [ "$MARKDOWN_REVIEW_EXISTS_BEFORE" = "yes" ]; then
            echo "Existing Markdown review file preserved: yes"
            echo "Markdown review file committed: no"
            exit 0
          fi

          echo "Existing Markdown review file preserved: no"

          if [ ! -f "$review_path" ]; then
            echo "::warning::Service-admin pipeline did not create $review_path."
            echo "Markdown review file committed: no"
            exit 0
          fi

          if [ -z "$(git status --porcelain -- "$review_path")" ]; then
            echo "No starter Markdown review file changes to commit."
            echo "Markdown review file committed: no"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$review_path"

          staged_files="$(git diff --cached --name-only)"
          if [ "$staged_files" != "$review_path" ]; then
            echo "::error::Refusing to commit files other than $review_path. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Add starter service-admin review Markdown"
          git push
          echo "Markdown review file committed: yes"

      - name: Commit service-admin output
        run: |
          set -euo pipefail
          output_path="pipeline/output-admin-service"

          if [ -z "$(git status --porcelain -- "$output_path")" ]; then
            echo "No admin service output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$output_path"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No admin service output changes to commit"
            exit 0
          fi

          unexpected_files="$(printf '%s\n' "$staged_files" | awk '$0 !~ /^pipeline\/output-admin-service\//')"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside $output_path. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Refresh JobG8 admin service outputs"
          git push

      - name: Upload service-admin output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-admin-output
          path: pipeline/output-admin-service/
          if-no-files-found: warn
