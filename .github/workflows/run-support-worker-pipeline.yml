name: Run support-worker pipeline

on:
  workflow_dispatch:

jobs:
  run-support-worker-pipeline:
    name: Run support-worker pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Run support-worker pipeline
        working-directory: pipeline
        run: python -m scripts.support_worker_pipeline

      - name: Upload support-worker output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-worker-output
          path: pipeline/output-support-worker/
          if-no-files-found: warn
