name: Add Sussex to homepage

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/add-sussex-homepage.yml'

permissions:
  contents: write

jobs:
  update-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-sussex-to-homepage
          fetch-depth: 0

      - name: Add Sussex through existing homepage card structure
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/page.tsx')
          text = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old!r}')
              text = text.replace(old, new, 1)

          replace_once(
              "import northEastSupportWorkerJobs from './north-east/support-worker-jobs.json';\n",
              "import northEastSupportWorkerJobs from './north-east/support-worker-jobs.json';\nimport sussexSupportWorkerJobs from './sussex/support-worker.json';\n",
          )

          replace_once(
              "  {\n    label: 'North East support worker jobs',\n    href: '/north-east/support-worker',\n  },\n  {\n    label: 'Browse all jobs',",
              "  {\n    label: 'North East support worker jobs',\n    href: '/north-east/support-worker',\n  },\n  {\n    label: 'Sussex support worker jobs',\n    href: '/sussex/support-worker',\n  },\n  {\n    label: 'Browse all jobs',",
          )

          replace_once(
              "  createSupportWorkerSlice({\n    region: 'North East',\n    title: 'North East Support Worker Jobs',\n    sliceUrl: '/north-east/support-worker',\n    jobs: northEastSupportWorkerJobs,\n  }),\n];",
              "  createSupportWorkerSlice({\n    region: 'North East',\n    title: 'North East Support Worker Jobs',\n    sliceUrl: '/north-east/support-worker',\n    jobs: northEastSupportWorkerJobs,\n  }),\n  createSupportWorkerSlice({\n    region: 'Sussex',\n    title: 'Sussex Support Worker Jobs',\n    sliceUrl: '/sussex/support-worker',\n    jobs: sussexSupportWorkerJobs,\n  }),\n];",
          )

          replace_once(
              "            Current support-worker roles are available in West Yorkshire and the North East. South\n            Yorkshire remains available as a retained page while current supply is limited.",
              "            Current support-worker roles are available in West Yorkshire, the North East and Sussex.\n            South Yorkshire remains available as a retained page while current supply is limited.",
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate focused homepage change
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('app/page.tsx').read_text(encoding='utf-8')
          assert "import sussexSupportWorkerJobs from './sussex/support-worker.json';" in text
          assert "title: 'Sussex Support Worker Jobs'" in text
          assert "sliceUrl: '/sussex/support-worker'" in text
          assert "jobs: sussexSupportWorkerJobs" in text
          assert "label: 'Sussex support worker jobs'" in text
          assert text.count('createSupportWorkerSlice({') == 5
          assert text.count("Admin & Customer Service Jobs'") == 4
          assert Path('app/sussex/support-worker.json').exists()
          PY

      - name: Commit homepage change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx
          git commit -m "Add Sussex support worker jobs to homepage"
          git push origin add-sussex-to-homepage
