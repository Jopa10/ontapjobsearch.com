name: Run full JobG8 daily process

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-full-jobg8-daily-process:
    name: Run full JobG8 daily process
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Resolve current JobG8 month
        id: jobg8-month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Run service-admin pipeline
        working-directory: pipeline
        run: python -m scripts.service_admin_pipeline

      - name: Run support-worker pipeline
        working-directory: pipeline
        run: python -m scripts.support_worker_pipeline

      - name: Run JobG8 profiler
        working-directory: pipeline
        run: >-
          python -m scripts.jobg8_profiler
          --month "${{ steps.jobg8-month.outputs.month }}"
          --input-dir input
          --output-dir output-feed-profiler
          --geo-lookup geo/lookup.xlsx

      - name: Commit JobG8 daily output
        run: |
          set -euo pipefail
          output_paths=(
            "pipeline/output-feed-profiler"
            "pipeline/output-admin-service"
            "pipeline/output-support-worker"
          )

          if [ -z "$(git status --porcelain -- "${output_paths[@]}")" ]; then
            echo "No JobG8 daily output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${output_paths[@]}"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No JobG8 daily output changes to commit"
            exit 0
          fi

          unexpected_files="$({ printf '%s\n' "$staged_files" | awk '$0 !~ /^pipeline\/(output-feed-profiler|output-admin-service|output-support-worker)\//'; } || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside JobG8 daily output folders. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Run full JobG8 daily process"
          git push

      - name: Commit JobG8 manual review files
        run: |
          set -euo pipefail
          manual_review_paths=(
            "pipeline/manual/service-admin-review.csv"
            "pipeline/manual/service-admin-review.md"
            "pipeline/manual/support-worker-review.csv"
            "pipeline/manual/support-worker-review.md"
          )

          if [ -z "$(git status --porcelain -- "${manual_review_paths[@]}")" ]; then
            echo "No JobG8 manual review changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${manual_review_paths[@]}"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No JobG8 manual review changes to commit"
            exit 0
          fi

          unexpected_files="$({ printf '%s\n' "$staged_files" | awk '$0 != "pipeline/manual/service-admin-review.csv" && $0 != "pipeline/manual/service-admin-review.md" && $0 != "pipeline/manual/support-worker-review.csv" && $0 != "pipeline/manual/support-worker-review.md"'; } || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside JobG8 manual review files. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Refresh JobG8 manual review files"
          git push

      - name: Upload JobG8 profiler output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobg8-profiler-output
          path: pipeline/output-feed-profiler/
          if-no-files-found: warn

      - name: Upload service-admin output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-admin-output
          path: pipeline/output-admin-service/
          if-no-files-found: warn

      - name: Upload support-worker output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-worker-output
          path: pipeline/output-support-worker/
          if-no-files-found: warn
