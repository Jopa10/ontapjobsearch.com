name: Run full JobG8 daily process

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-full-jobg8-daily-process:
    name: Run full JobG8 daily process
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Read LIVE slices from register
        id: slice-register
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          scripts = Path("pipeline/scripts").resolve()
          sys.path.insert(0, str(scripts))
          from slice_registry import live_slices

          active = sorted(live_slices())
          print("LIVE slices:")
          for region, category in active:
              print(f"- {region} / {category}")

          categories = {category for _, category in active}
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"admin_service={'true' if 'admin_service' in categories else 'false'}\n")
              handle.write(f"support_worker={'true' if 'support_worker' in categories else 'false'}\n")
          PY

      - name: Resolve current JobG8 month
        id: jobg8-month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Run service-admin pipeline
        if: steps.slice-register.outputs.admin_service == 'true'
        working-directory: pipeline
        run: python -m scripts.service_admin_pipeline_education

      - name: Verify service-admin outputs
        if: steps.slice-register.outputs.admin_service == 'true'
        run: |
          test -s pipeline/output-admin-service/west-yorkshire-admin-service.json
          test -s pipeline/output-admin-service/south-yorkshire-admin-service.json
          test -s pipeline/output-admin-service/north-east-admin-service.json
          test -s pipeline/output-admin-service/london-admin-service.json
          test -s pipeline/output-admin-service/hampshire-admin-service.json

      - name: Run support-worker pipeline
        if: steps.slice-register.outputs.support_worker == 'true'
        working-directory: pipeline
        run: python -m scripts.support_worker_pipeline

      - name: Verify support-worker outputs
        if: steps.slice-register.outputs.support_worker == 'true'
        run: |
          test -s pipeline/output-support-worker/west-yorkshire-support-worker.json
          test -s pipeline/output-support-worker/south-yorkshire-support-worker.json
          test -s pipeline/output-support-worker/north-east-support-worker.json
          test -s pipeline/output-support-worker/sussex-support-worker.json
          test -s pipeline/output-support-worker/cumbria-south-support-worker.json

      - name: Commit JobG8 daily output
        run: |
          set -euo pipefail
          output_paths=(
            "pipeline/output-admin-service/*.json"
            "pipeline/output-support-worker/*.json"
            "pipeline/reports-daily"
          )

          if [ -z "$(git status --porcelain -- "${output_paths[@]}")" ]; then
            echo "No JobG8 daily output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${output_paths[@]}"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No JobG8 daily output changes to commit"
            exit 0
          fi

          unexpected_files="$({ printf '%s\n' "$staged_files" | awk '$0 !~ /^pipeline\/output-admin-service\/.*\.json$/ && $0 !~ /^pipeline\/output-support-worker\/.*\.json$/ && $0 !~ /^pipeline\/reports-daily\/(decision-report|validation-report|selection-summary-report)-(admin-service|support-worker)\.csv$/'; } || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside JobG8 daily output folders. Staged files:"
            printf '%s\n' "$unexpected_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Run full JobG8 daily process"
          git push

      - name: Commit JobG8 manual review files
        run: |
          set -euo pipefail
          manual_review_paths=(
            "pipeline/manual/service-admin-review.csv"
            "pipeline/manual/service-admin-review.md"
            "pipeline/manual/support-worker-review.csv"
            "pipeline/manual/support-worker-review.md"
          )

          if [ -z "$(git status --porcelain -- "${manual_review_paths[@]}")" ]; then
            echo "No JobG8 manual review changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${manual_review_paths[@]}"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No JobG8 manual review changes to commit"
            exit 0
          fi

          unexpected_files="$({ printf '%s\n' "$staged_files" | awk '$0 != "pipeline/manual/service-admin-review.csv" && $0 != "pipeline/manual/service-admin-review.md" && $0 != "pipeline/manual/support-worker-review.csv" && $0 != "pipeline/manual/support-worker-review.md"'; } || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside JobG8 manual review files. Staged files:"
            printf '%s\n' "$unexpected_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Refresh JobG8 manual review files"
          git push

      - name: Upload service-admin output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-admin-output
          path: pipeline/output-admin-service/
          if-no-files-found: warn

      - name: Upload support-worker output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-worker-output
          path: pipeline/output-support-worker/
          if-no-files-found: warn
