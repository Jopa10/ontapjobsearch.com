name: Test slice register

on:
  pull_request:
    paths:
      - 'pipeline/registers/region_category_slice_register.csv'
      - 'pipeline/scripts/slice_registry.py'
      - 'pipeline/scripts/publish_verified_pages.py'
      - '.github/workflows/run-full-jobg8-daily-process.yml'
      - 'tests/test_slice_registry.py'
      - 'tests/test_publish_verified_pages.py'
  push:
    branches: [main]
    paths:
      - 'pipeline/registers/region_category_slice_register.csv'
      - 'pipeline/scripts/slice_registry.py'
      - 'pipeline/scripts/publish_verified_pages.py'
      - '.github/workflows/run-full-jobg8-daily-process.yml'
      - 'tests/test_slice_registry.py'
      - 'tests/test_publish_verified_pages.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate Python and register tests
        run: |
          python -m py_compile pipeline/scripts/slice_registry.py pipeline/scripts/publish_verified_pages.py
          python -m unittest tests.test_slice_registry tests.test_publish_verified_pages -v
      - name: Confirm current six LIVE slices are publishable
        run: python pipeline/scripts/publish_verified_pages.py --dry-run
