name: Run JobG8 profiler

on:
  workflow_dispatch:
    inputs:
      month:
        description: Month to profile in YYYY-MM format
        required: true
        type: string
      input_dir:
        description: Input folder under pipeline/ containing JobG8 files
        required: false
        default: input
        type: string

permissions:
  contents: write

jobs:
  run-jobg8-profiler:
    name: Run JobG8 profiler
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Run JobG8 profiler
        working-directory: pipeline
        run: >-
          python -m scripts.jobg8_profiler
          --month "${{ inputs.month }}"
          --input-dir "${{ inputs.input_dir }}"
          --output-dir output-profiler
          --geo-lookup geo/lookup.xlsx

      - name: Sync profiler output into committed output folder
        run: |
          set -euo pipefail
          mkdir -p pipeline/output-feed-profiler
          rsync -a pipeline/output-profiler/ pipeline/output-feed-profiler/

      - name: Commit profiler output changes
        run: |
          set -euo pipefail
          output_path="pipeline/output-feed-profiler"

          if [ -z "$(git status --porcelain -- "$output_path")" ]; then
            echo "No profiler output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$output_path"

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No profiler output changes to commit"
            exit 0
          fi

          unexpected_files="$({ printf '%s\n' "$staged_files" | awk '$0 !~ /^pipeline\/output-feed-profiler\//'; } || true)"
          if [ -n "$unexpected_files" ]; then
            echo "::error::Refusing to commit files outside pipeline/output-feed-profiler. Staged files:"
            printf '%s\n' "$staged_files"
            git reset --mixed
            exit 1
          fi

          git commit -m "Update JobG8 profiler outputs"
          git push origin HEAD:main

      - name: Upload profiler output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobg8-profiler-output
          path: pipeline/output-profiler/
          if-no-files-found: warn
