name: Expansion Manual Review

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to run expansion review on
        required: true
        default: test-9-expansion-clean-geo-diagnostics
  push:
    branches:
      - test-9-expansion-clean-geo-diagnostics
    paths:
      - '.github/workflows/run-expansion-manual-review.yml'
      - 'pipeline/scripts/expansion_review.py'
      - 'pipeline/input/jobg8.xlsx'
      - 'pipeline/geo/geo_lookup.xlsx'

concurrency:
  group: expansion-manual-review-${{ github.event.inputs.target_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  expansion-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Save existing expansion manual decisions
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            service-admin-expansion-review.csv \
            support-worker-expansion-review.csv
          do
            if [ -f "pipeline/manual-expansion/$file" ]; then
              cp "pipeline/manual-expansion/$file" "/tmp/previous-$file"
            fi
          done

      - name: Generate expansion manual reviews
        run: PYTHONDONTWRITEBYTECODE=1 python -m pipeline.scripts.expansion_review

      - name: Restore expansion manual decisions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          from pipeline.scripts import expansion_review as review

          output_dir = Path('pipeline/manual-expansion')
          columns = review.CSV_COLUMNS

          def restore(filename):
              current_path = output_dir / filename
              previous_path = Path('/tmp') / f'previous-{filename}'
              current = pd.read_csv(current_path, dtype=str, keep_default_na=False)

              if previous_path.exists():
                  previous = pd.read_csv(previous_path, dtype=str, keep_default_na=False)
                  required = {'region', 'job_id', 'manual_override', 'manual_select'}
                  if required.issubset(previous.columns):
                      saved = {
                          (str(row['region']).strip(), str(row['job_id']).strip()): (
                              str(row['manual_override']).strip(),
                              str(row['manual_select']).strip(),
                          )
                          for _, row in previous.iterrows()
                      }
                      for index, row in current.iterrows():
                          key = (str(row['region']).strip(), str(row['job_id']).strip())
                          if key not in saved:
                              continue
                          manual_override, manual_select = saved[key]
                          current.at[index, 'manual_override'] = manual_override
                          current.at[index, 'manual_select'] = manual_select
                          if manual_select.casefold() == 'select':
                              current.at[index, 'decision'] = 'SELECTED'

              current = review.sort_reviews(current[columns])
              current.to_csv(current_path, index=False, encoding='utf-8-sig')
              return current

          admin = restore('service-admin-expansion-review.csv')
          support = restore('support-worker-expansion-review.csv')
          review.write_md(
              admin,
              output_dir / 'service-admin-expansion-review.md',
              'Admin/service expansion review',
          )
          review.write_md(
              support,
              output_dir / 'support-worker-expansion-review.md',
              'Support-worker expansion review',
          )
          review.log_summary(admin, support)
          PY

      - name: Confirm protected daily files unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            pipeline/manual/service-admin-review.csv \
            pipeline/manual/service-admin-review.md \
            pipeline/manual/support-worker-review.csv \
            pipeline/manual/support-worker-review.md \
            pipeline/output-admin-service \
            pipeline/output-support-worker \
            app

      - name: Commit expansion review outputs
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ github.event.inputs.target_branch || github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/manual-expansion/service-admin-expansion-review.csv \
                  pipeline/manual-expansion/service-admin-expansion-review.md \
                  pipeline/manual-expansion/support-worker-expansion-review.csv \
                  pipeline/manual-expansion/support-worker-expansion-review.md \
                  pipeline/manual-expansion/expansion-review-run-log.txt
          if git diff --cached --quiet; then
            echo "No expansion review output changes to commit."
          else
            git commit -m "Add expansion manual review outputs"
            git pull --rebase origin "$TARGET_BRANCH"
            git push origin HEAD:"$TARGET_BRANCH"
          fi
