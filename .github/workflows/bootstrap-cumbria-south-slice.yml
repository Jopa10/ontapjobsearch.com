name: Bootstrap Cumbria South support-worker slice

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap-cumbria-south:
    if: github.event.pull_request.head.ref == 'feature/cumbria-south-support-worker-slice'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/cumbria-south-support-worker-slice
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas openpyxl pytest

      - name: Add Cumbria South production wiring
        run: python pipeline/scripts/bootstrap_cumbria_south_slice.py

      - name: Run support-worker pipeline
        working-directory: pipeline
        run: python -m scripts.support_worker_pipeline

      - name: Inspect Cumbria South output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("pipeline/output-support-worker/cumbria-south-support-worker.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          if not data:
              raise SystemExit("Cumbria South output is empty")
          if any(row.get("region") != "Cumbria - South" for row in data):
              raise SystemExit("Cumbria South output has an incorrect internal region")
          print(f"Cumbria South generated jobs: {len(data)}")
          for row in data:
              print(f"- {row.get('job_id')} | {row.get('title')} | {row.get('location')}")
          PY
          cp pipeline/output-support-worker/cumbria-south-support-worker.json app/cumbria-south/support-worker.json

      - name: Validate pipeline and publisher
        run: |
          python -m py_compile pipeline/scripts/support_worker_pipeline.py pipeline/scripts/publish_verified_pages.py
          pytest -q tests/test_pipeline_possible_selection.py
          python pipeline/scripts/publish_verified_pages.py --dry-run

      - name: Build production site
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ontap
        run: |
          npm ci
          npm run build

      - name: Commit completed Cumbria South slice
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/bootstrap-cumbria-south-slice.yml \
            pipeline/scripts/bootstrap_cumbria_south_slice.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/publish-verified-pages.yml \
            .github/workflows/run-full-jobg8-daily-process.yml \
            app/cumbria-south \
            app/sitemap.ts \
            pipeline/geo/geo_lookup.xlsx \
            pipeline/manual/support-worker-review.csv \
            pipeline/manual/support-worker-review.md \
            pipeline/output-support-worker/cumbria-south-support-worker.json \
            pipeline/registers/region_category_slice_register.csv \
            pipeline/reports-daily/decision-report-support-worker.csv \
            pipeline/reports-daily/selection-summary-report-support-worker.csv \
            pipeline/reports-daily/validation-report-support-worker.csv \
            pipeline/scripts/publish_verified_pages.py \
            pipeline/scripts/support_worker_pipeline.py
          git commit -m "Build Cumbria South support-worker production slice"
          git push origin feature/cumbria-south-support-worker-slice
