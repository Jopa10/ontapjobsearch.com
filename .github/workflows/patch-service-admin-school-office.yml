name: Patch service-admin school-office eligibility

on:
  push:
    branches:
      - agent/allow-school-office-admin
    paths:
      - .github/workflows/patch-service-admin-school-office.yml
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out change branch
        uses: actions/checkout@v4
        with:
          ref: agent/allow-school-office-admin
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check pandas

      - name: Patch classification logic and add regression tests
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import io
          from pathlib import Path

          pipeline_path = Path("pipeline/scripts/service_admin_pipeline.py")
          text = pipeline_path.read_text(encoding="utf-8")

          old_hard_pass_line = (
              '    "teacher", "teaching", "school", "semh", "send", "sen ", '
              '"learning support", "teaching assistant",\n'
          )
          new_hard_pass_lines = (
              '    "teacher", "teaching", "semh", "send", "sen ", "learning support", '
              '"learning-support", "teaching assistant",\n'
              '    "classroom assistant", "cover supervisor", "tutor", "lecturer", "pastoral", '
              '"behaviour support", "behavior support",\n'
              '    "sen classroom", "specialist education practitioner",\n'
          )
          if text.count(old_hard_pass_line) != 1:
              raise SystemExit("Expected one school hard-pass seed to replace")
          text = text.replace(old_hard_pass_line, new_hard_pass_lines)

          old_constants_anchor = '''    "business development", "account manager", "sales consultant", "telesales", "estate agent",
]

# Clear office/admin/service-support roles.
'''
          new_constants_anchor = '''    "business development", "account manager", "sales consultant", "telesales", "estate agent",
]

# Education is a sector, not a job function. These terms may qualify a title for
# service-admin only when a clear office/admin function is also present.
EDUCATION_SECTOR_PATTERNS = [
    "school", "academy", "college", "education",
]
EDUCATION_ADMIN_FUNCTION_PATTERNS = [
    "admin", "administrator", "administration", "administrative",
    "reception", "receptionist", "office manager", "office administrator", "office assistant",
    "attendance", "admissions", "records", "data entry", "diary support", "business support",
    "clerical", "secretary",
]

# Clear office/admin/service-support roles.
'''
          if text.count(old_constants_anchor) != 1:
              raise SystemExit("Expected one hard-pass/constants anchor to replace")
          text = text.replace(old_constants_anchor, new_constants_anchor)

          old_doc_rule = "    - hard-pass patterns override everything\n"
          new_doc_rule = (
              "    - non-admin hard-pass patterns override everything\n"
              "    - clear education-sector admin functions stay eligible before stale exact register entries\n"
          )
          if text.count(old_doc_rule) != 1:
              raise SystemExit("Expected one classify_title rule line to replace")
          text = text.replace(old_doc_rule, new_doc_rule)

          old_classify_block = '''    hard_hits = [p.strip() for p in HARD_PASS_PATTERNS if contains_pattern(title_key, p)]
    if hard_hits:
        classification = "HARD_PASS"
        return classification, "hard pass title pattern: " + ", ".join(hard_hits), CLASSIFICATION_PRIORITY[classification], "STABLE"

    exact = title_register.get(title_key)
'''
          new_classify_block = '''    hard_hits = [p.strip() for p in HARD_PASS_PATTERNS if contains_pattern(title_key, p)]
    if hard_hits:
        classification = "HARD_PASS"
        return classification, "hard pass title pattern: " + ", ".join(hard_hits), CLASSIFICATION_PRIORITY[classification], "STABLE"

    education_sector_hits = [
        p for p in EDUCATION_SECTOR_PATTERNS if contains_pattern(title_key, p)
    ]
    education_admin_hits = [
        p for p in EDUCATION_ADMIN_FUNCTION_PATTERNS if contains_pattern(title_key, p)
    ]
    if education_sector_hits and education_admin_hits:
        classification = "HIGH_CONFIDENCE"
        reason = (
            "education-sector admin function: "
            + ", ".join(education_sector_hits)
            + "; "
            + ", ".join(education_admin_hits)
        )
        return classification, reason, CLASSIFICATION_PRIORITY[classification], "STABLE"

    exact = title_register.get(title_key)
'''
          if text.count(old_classify_block) != 1:
              raise SystemExit("Expected one classify_title hard-pass block to replace")
          text = text.replace(old_classify_block, new_classify_block)
          pipeline_path.write_text(text, encoding="utf-8")

          register_path = Path("pipeline/registers/admin_service_title_classification_register.csv")
          raw = register_path.read_bytes()
          bom = b"\xef\xbb\xbf" if raw.startswith(b"\xef\xbb\xbf") else b""
          register_text = raw[len(bom):].decode("utf-8")
          updated_titles: set[str] = set()
          output_lines: list[str] = []

          sector_terms = ("school", "academy", "college", "education")
          admin_terms = (
              "admin", "administrator", "administration", "administrative", "reception",
              "receptionist", "office manager", "office administrator", "office assistant",
              "attendance", "admissions", "records", "data entry", "diary support",
              "business support", "clerical", "secretary",
          )
          non_admin_terms = (
              "teacher", "teaching", "learning support", "learning-support", "classroom assistant",
              "cover supervisor", "tutor", "lecturer", "pastoral", "behaviour support",
              "behavior support", "semh", "send", "sen ", "specialist education practitioner",
          )

          for raw_line in register_text.splitlines(keepends=True):
              if raw_line.endswith("\r\n"):
                  body, ending = raw_line[:-2], "\r\n"
              elif raw_line.endswith("\n"):
                  body, ending = raw_line[:-1], "\n"
              else:
                  body, ending = raw_line, ""

              row = next(csv.reader([body]))
              if len(row) >= 4 and row[0] != "title":
                  title_key = row[0].strip().lower()
                  is_sector = any(term in title_key for term in sector_terms)
                  is_admin = any(term in title_key for term in admin_terms)
                  is_non_admin = any(term in title_key for term in non_admin_terms)
                  school_only_hard_pass = (
                      row[1].strip().upper() == "HARD_PASS"
                      and "hard pass title pattern: school" in row[3].strip().lower()
                  )
                  if is_sector and is_admin and not is_non_admin and school_only_hard_pass:
                      row[1] = "HIGH_CONFIDENCE"
                      row[2] = "STABLE"
                      row[3] = "education sector with clear office/admin function"
                      buffer = io.StringIO()
                      csv.writer(buffer, lineterminator="").writerow(row)
                      body = buffer.getvalue()
                      updated_titles.add(row[0])
              output_lines.append(body + ending)

          required_register_updates = {"School Administrator", "School Receptionist", "School Admin"}
          missing_updates = required_register_updates - updated_titles
          if missing_updates:
              raise SystemExit(
                  "Expected stale school-office register rows were not updated: "
                  + ", ".join(sorted(missing_updates))
              )
          register_path.write_bytes(bom + "".join(output_lines).encode("utf-8"))

          test_path = Path("pipeline/tests/test_service_admin_education_titles.py")
          test_path.parent.mkdir(parents=True, exist_ok=True)
          test_path.write_text('''from __future__ import annotations

import csv
import sys
import unittest
from pathlib import Path

REPO_ROOT = Path(__file__).resolve().parents[2]
if str(REPO_ROOT) not in sys.path:
    sys.path.insert(0, str(REPO_ROOT))

from pipeline.scripts.service_admin_pipeline import (  # noqa: E402
    classify_title,
    normalise_title_for_register,
)

REGISTER_PATH = REPO_ROOT / "pipeline" / "registers" / "admin_service_title_classification_register.csv"


def load_register() -> dict[str, dict[str, str]]:
    with REGISTER_PATH.open("r", encoding="utf-8-sig", newline="") as handle:
        rows = csv.DictReader(handle)
        return {
            normalise_title_for_register(row["title"]): {
                "classification": row["classification"],
                "review_status": row["review_status"],
                "reason": row["reason"],
            }
            for row in rows
            if row.get("title")
        }


class ServiceAdminEducationTitleTests(unittest.TestCase):
    @classmethod
    def setUpClass(cls) -> None:
        cls.title_register = load_register()

    def classification_for(self, title: str) -> str:
        classification, _reason, _priority, _review_status = classify_title(
            title,
            self.title_register,
        )
        return classification

    def test_school_office_admin_titles_are_eligible(self) -> None:
        eligible_titles = (
            "School Administrator",
            "Primary School Administrator",
            "School Reception Administrator",
            "School Receptionist Administrator",
            "School Office Manager",
        )
        for title in eligible_titles:
            with self.subTest(title=title):
                self.assertEqual("HIGH_CONFIDENCE", self.classification_for(title))

    def test_non_admin_education_titles_remain_excluded(self) -> None:
        excluded_titles = (
            "Teaching Assistant",
            "Learning Support Assistant",
            "Cover Supervisor",
        )
        for title in excluded_titles:
            with self.subTest(title=title):
                self.assertEqual("HARD_PASS", self.classification_for(title))

    def test_specialist_education_support_still_beats_admin_word(self) -> None:
        self.assertEqual(
            "HARD_PASS",
            self.classification_for("School Behaviour Support Administrator"),
        )

    def test_plain_office_manager_keeps_existing_register_rule(self) -> None:
        self.assertEqual("OUT_OF_SCOPE", self.classification_for("Office Manager"))


if __name__ == "__main__":
    unittest.main(verbosity=2)
''', encoding="utf-8")
          PY

      - name: Run targeted tests
        shell: bash
        run: |
          set -o pipefail
          python pipeline/tests/test_service_admin_education_titles.py 2>&1 | tee pipeline/tests/service_admin_education_test_results.txt
          python -m py_compile pipeline/scripts/service_admin_pipeline.py pipeline/tests/test_service_admin_education_titles.py 2>&1 | tee -a pipeline/tests/service_admin_education_test_results.txt
          printf '\npy_compile: PASS\n' | tee -a pipeline/tests/service_admin_education_test_results.txt

      - name: Commit tested change to branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/scripts/service_admin_pipeline.py \
                  pipeline/registers/admin_service_title_classification_register.csv \
                  pipeline/tests/test_service_admin_education_titles.py \
                  pipeline/tests/service_admin_education_test_results.txt
          git commit -m "Allow school office admin roles"
          git push origin HEAD:agent/allow-school-office-admin
