name: Execute Hampshire bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  execute-hampshire-bootstrap:
    if: github.head_ref == 'feature/hampshire-admin-service-slice'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute production bootstrap with diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          root = Path.cwd()
          error_path = root / 'bootstrap-error.txt'
          if error_path.exists():
              subprocess.run(['git', 'rm', 'bootstrap-error.txt'], check=True)

          workflow_path = root / '.github/workflows/bootstrap-hampshire-slice.yml'
          text = workflow_path.read_text(encoding='utf-8')
          text = text.replace(
              '          git rm .github/workflows/bootstrap-hampshire-slice.yml\n',
              '          git rm .github/workflows/bootstrap-hampshire-slice.yml\n'
              '          git rm .github/workflows/execute-hampshire-bootstrap.yml\n',
          )
          workflow_path.write_text(text, encoding='utf-8')

          lines = text.splitlines()
          blocks = []
          index = 0
          while index < len(lines):
              line = lines[index]
              if line.strip() == 'run: |':
                  base_indent = len(line) - len(line.lstrip())
                  index += 1
                  block_lines = []
                  while index < len(lines):
                      candidate = lines[index]
                      indent = len(candidate) - len(candidate.lstrip())
                      if candidate.strip() and indent <= base_indent:
                          break
                      cut = min(len(candidate), base_indent + 2)
                      block_lines.append(candidate[cut:])
                      index += 1
                  blocks.append('\n'.join(block_lines))
                  continue
              index += 1

          def run(command, label):
              result = subprocess.run(command, text=True, capture_output=True)
              print(result.stdout)
              print(result.stderr)
              if result.returncode == 0:
                  return
              report = (
                  f'FAILED STAGE: {label}\n'
                  f'RETURN CODE: {result.returncode}\n\n'
                  f'STDOUT:\n{result.stdout[-20000:]}\n\n'
                  f'STDERR:\n{result.stderr[-20000:]}\n'
              )
              error_path.write_text(report, encoding='utf-8')
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
              subprocess.run(['git', 'add', 'bootstrap-error.txt'], check=True)
              subprocess.run(['git', 'commit', '-m', 'Record Hampshire bootstrap failure'], check=True)
              subprocess.run(['git', 'push'], check=True)
              raise SystemExit(report)

          if len(blocks) != 3:
              run(['bash', '-c', 'exit 1'], f'parse bootstrap workflow: found {len(blocks)} blocks')

          run(['python', '-m', 'pip', 'install', '--upgrade', 'pip', 'pandas', 'openpyxl'], 'install Python packages')

          from openpyxl import load_workbook
          geo_path = root / 'pipeline/geo/geo_lookup.xlsx'
          workbook = load_workbook(geo_path)
          sheet = workbook['Anchor_towns']
          existing = {
              tuple(str(value or '').strip() for value in row)
              for row in sheet.iter_rows(min_row=2, max_col=3, values_only=True)
          }
          anchor = ('Hampshire', 'admin_service', 'Southampton')
          if anchor not in existing:
              sheet.append(anchor)
              workbook.save(geo_path)
          subprocess.run(['git', 'add', str(geo_path)], check=True)

          run(['bash', '-euo', 'pipefail', '-c', blocks[0]], 'build Hampshire slice')
          run(['bash', '-euo', 'pipefail', '-c', blocks[1]], 'validate Python and publisher')
          run(['npm', 'ci'], 'npm ci')
          run(['bash', '-c', 'DATABASE_URL=postgresql://ontap:ontap@localhost:5432/ontap npm run build'], 'npm build')
          run(['bash', '-euo', 'pipefail', '-c', blocks[2]], 'commit completed Hampshire slice')
          PY
