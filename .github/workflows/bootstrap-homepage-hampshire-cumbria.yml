name: Add Hampshire and Cumbria South to homepage

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-homepage:
    if: github.event.pull_request.head.ref == 'feature/add-hampshire-cumbria-homepage'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/add-hampshire-cumbria-homepage
          fetch-depth: 0

      - name: Add homepage cards and links
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/page.tsx')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "import sussexSupportWorkerJobs from './sussex/support-worker.json';\n",
                  "import sussexSupportWorkerJobs from './sussex/support-worker.json';\n"
                  "import cumbriaSouthSupportWorkerJobs from './cumbria-south/support-worker.json';\n",
              ),
              (
                  "import londonServiceAdministratorJobs from './london/service-administrator-jobs.json';\n",
                  "import londonServiceAdministratorJobs from './london/service-administrator-jobs.json';\n"
                  "import hampshireServiceAdministratorJobs from './hampshire/service-administrator-jobs.json';\n",
              ),
              (
                  "  {\n    label: 'London service administrator jobs',\n    href: '/london/service-administrator-jobs',\n  },\n",
                  "  {\n    label: 'London service administrator jobs',\n    href: '/london/service-administrator-jobs',\n  },\n"
                  "  {\n    label: 'Hampshire service administrator jobs',\n    href: '/hampshire/service-administrator-jobs',\n  },\n",
              ),
              (
                  "  {\n    label: 'Sussex support worker jobs',\n    href: '/sussex/support-worker',\n  },\n",
                  "  {\n    label: 'Sussex support worker jobs',\n    href: '/sussex/support-worker',\n  },\n"
                  "  {\n    label: 'South Cumbria support worker jobs',\n    href: '/cumbria-south/support-worker',\n  },\n",
              ),
              (
                  "  createSupportWorkerSlice({\n    region: 'Sussex',\n    title: 'Sussex Support Worker Jobs',\n    sliceUrl: '/sussex/support-worker',\n    jobs: sussexSupportWorkerJobs,\n  }),\n];",
                  "  createSupportWorkerSlice({\n    region: 'Sussex',\n    title: 'Sussex Support Worker Jobs',\n    sliceUrl: '/sussex/support-worker',\n    jobs: sussexSupportWorkerJobs,\n  }),\n"
                  "  createSupportWorkerSlice({\n    region: 'South Cumbria',\n    title: 'South Cumbria Support Worker Jobs',\n    sliceUrl: '/cumbria-south/support-worker',\n    jobs: cumbriaSouthSupportWorkerJobs,\n  }),\n];",
              ),
              (
                  "  {\n    title: 'London Admin & Customer Service Jobs',\n    intro:\n      'Current admin, office and service roles across London.',\n    ctaText: 'View London jobs →',\n    sliceUrl: '/london/service-administrator-jobs',\n    jobs: londonServiceAdministratorJobs,\n  },\n];",
                  "  {\n    title: 'London Admin & Customer Service Jobs',\n    intro:\n      'Current admin, office and service roles across London.',\n    ctaText: 'View London jobs →',\n    sliceUrl: '/london/service-administrator-jobs',\n    jobs: londonServiceAdministratorJobs,\n  },\n"
                  "  {\n    title: 'Hampshire Admin & Customer Service Jobs',\n    intro:\n      'Current admin, office and service roles across Hampshire.',\n    ctaText: 'View Hampshire jobs →',\n    sliceUrl: '/hampshire/service-administrator-jobs',\n    jobs: hampshireServiceAdministratorJobs,\n  },\n];",
              ),
              (
                  "          Current service administrator, office support and customer-service roles across London,\n          Yorkshire and the North East. Updated daily; apply directly on employer sites.\n",
                  "          Current service administrator, office support and customer-service roles across Hampshire,\n          London, Yorkshire and the North East. Updated daily; apply directly on employer sites.\n",
              ),
              (
                  "            Current support-worker roles are available in West Yorkshire, the North East and Sussex.\n            South Yorkshire remains available as a retained page while current supply is limited.\n",
                  "            Current support-worker roles are available in West Yorkshire, the North East, Sussex and\n            South Cumbria. South Yorkshire remains available as a retained page while current supply is limited.\n",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one homepage match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Confirm sitemap routes
        run: |
          grep -Fxq "  '/hampshire/service-administrator-jobs'," app/sitemap.ts
          grep -Fxq "  '/cumbria-south/support-worker'," app/sitemap.ts

      - name: Build production site
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ontap
        run: |
          npm ci
          npm run build

      - name: Commit homepage update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx
          if git diff --cached --quiet; then
            echo "Homepage already updated"
            exit 0
          fi
          git commit -m "Add Hampshire and South Cumbria to homepage"
          git push origin feature/add-hampshire-cumbria-homepage
